name: Build TrophyRoom APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Run build script
        run: bash .github/workflows/build-trophyroom.sh "${{ github.workspace }}" ${{ github.run_number }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          files: /tmp/TrophyRoom.apk
          make_latest: true
          fail_on_unmatched_files: false
          generate_release_notes: false
