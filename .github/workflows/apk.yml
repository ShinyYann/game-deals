name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        working-directory: trophyroom-app
        run: flutter pub get

      - name: 🔧 Setup Gradle wrapper
        working-directory: trophyroom-app
        run: |
          chmod +x android/gradlew
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar" \
              -o android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: 🔨 Build APK
        working-directory: trophyroom-app
        run: flutter build apk --debug

      - name: 📤 Prepare APK
        run: |
          mkdir -p release
          APK_PATH="trophyroom-app/build/app/outputs/flutter-apk/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            cp "$APK_PATH" release/TrophyRoom.apk
            echo "APK ready: $(ls -lh release/TrophyRoom.apk)"
          else
            echo "APK not found at $APK_PATH" >&2
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TrophyRoom v${{ github.run_number }}"
          body: |
            🏆 **TrophyRoom** 自动构建

            - 版本: v${{ github.run_number }}
            - Flutter 原生 APK

            > 可直接 sideload 安装到安卓设备
          files: release/TrophyRoom.apk
          make_latest: true
