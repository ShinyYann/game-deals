name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/cirruslabs/flutter:latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Get dependencies
        run: |
          cd trophyroom-app
          flutter pub get

      - name: 🔨 Build APK
        run: |
          cd trophyroom-app
          flutter build apk --debug

      - name: 📤 Prepare APK
        run: |
          mkdir -p release
          APK_SRC="trophyroom-app/build/app/outputs/flutter-apk/app-debug.apk"
          echo "Checking for APK at: $APK_SRC"
          ls -la "$APK_SRC" 2>/dev/null || find trophyroom-app -name "*.apk" 2>/dev/null | head -5
          if [ -f "$APK_SRC" ]; then
            cp "$APK_SRC" release/TrophyRoom.apk
            echo "✅ APK ready: $(ls -lh release/TrophyRoom.apk)"
          else
            echo "❌ APK not found" >&2
            exit 1
          fi

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TrophyRoom v${{ github.run_number }}"
          body: |
            🏆 **TrophyRoom** v${{ github.run_number }}
            Flutter 原生 APK
          files: release/TrophyRoom.apk
          make_latest: true
