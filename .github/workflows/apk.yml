name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/**'
      - '.github/workflows/apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trophyroom-app

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --target-platform android-arm,android-arm64

      - name: Prepare APK
        run: |
          APK_PATH=$(find build -name "*.apk" -not -name "*unaligned*" 2>/dev/null | head -1)
          cp "$APK_PATH" release.apk
          echo "APK_SIZE=$(stat -c%s release.apk)" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: TrophyRoom-APK
          path: trophyroom-app/release.apk
          retention-days: 1

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "TrophyRoom Latest"
          body: "Auto-build ${{ github.run_number }} — ${{ env.APK_SIZE }} bytes"
          artifacts: trophyroom-app/release.apk
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
