name: Build TrophyRoom APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create fresh Flutter project
        run: |
          cd /tmp
          flutter create --org com.yann --project-name trophyroom trophyroom
          # Remove default code
          rm -rf trophyroom/lib/*
          # Copy our code structure
          cp -r ${{ github.workspace }}/trophyroom-app/lib/* /tmp/trophyroom/lib/
          cp ${{ github.workspace }}/trophyroom-app/pubspec.yaml /tmp/trophyroom/pubspec.yaml
          # Keep the fresh android/ from flutter create
          # Our gradle files are replaced by flutter create's
          cd /tmp/trophyroom
          flutter pub get

      - name: Patch applicationId + signing
        working-directory: /tmp/trophyroom/android
        run: |
          sed -i 's/applicationId.*/applicationId "com.yann.trophyroom"/' app/build.gradle
          # Add signing config
          cat >> app/build.gradle << 'GRADLE'
          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

      - name: Create key.properties
        working-directory: /tmp/trophyroom/android
        run: |
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass trophyroom -keypass trophyroom \
            -dname "CN=TrophyRoom, OU=Dev, O=Yann, L=Shanghai, S=Shanghai, C=CN"
          cat > /tmp/trophyroom/android/key.properties << EOF
          storePassword=trophyroom
          keyPassword=trophyroom
          keyAlias=release
          storeFile=/tmp/release.keystore
          EOF

      - name: Build Release APK
        run: |
          cd /tmp/trophyroom
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk /tmp/TrophyRoom.apk

      - name: Verify APK
        run: |
          file /tmp/TrophyRoom.apk
          ls -lh /tmp/TrophyRoom.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          files: /tmp/TrophyRoom.apk
          make_latest: true
          fail_on_unmatched_files: false
          generate_release_notes: false
