name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/**'
      - '.github/workflows/apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          cd trophyroom-app
          flutter pub get
          flutter build apk --release --target-platform android-arm,android-arm64

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrophyRoom
          path: trophyroom-app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: apk-minimal
          name: "TrophyRoom v1.0.0"
          body: |
            最小化 APK — 联网权限测试
            
            - 仅一个页面 + 联网测试按钮
            - 权限: INTERNET, ACCESS_NETWORK_STATE, ACCESS_WIFI_STATE
          artifacts: trophyroom-app/build/app/outputs/flutter-apk/app-release.apk
          allowUpdates: true
          replacesArtifacts: true
