name: Build APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use PWA2APK
        uses: peaceiris/actions-pwa2apk@v1
        with:
          pwa_url: https://shinyyann.github.io/game-deals/
          package_name: com.yann.gamedeals
          app_name: Yann小站
          apk_file_name: Yann小站.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Yann小站 v${{ github.run_number }}"
          body: "📱 自动构建 APK"
          files: Yann小站.apk
          make_latest: true
