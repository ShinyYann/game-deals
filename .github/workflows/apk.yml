name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trophyroom-app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: 📦 Get packages
        run: flutter pub get

      - name: 🔨 Build APK
        run: flutter build apk --debug > build_output.log 2>&1 || echo "BUILD_FAILED=1" >> $GITHUB_ENV

      - name: 📄 Upload build logs (if failed)
        if: env.BUILD_FAILED == '1'
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: trophyroom-app/build_output.log

      - name: 📤 Prepare APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-debug.apk release/TrophyRoom.apk && echo "OK" || echo "APK_MISSING=1" >> $GITHUB_ENV

      - name: 🚀 Create Release
        if: env.APK_MISSING != '1'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          body: 🏆 TrophyRoom APK
          files: ${{ github.workspace }}/trophyroom-app/release/TrophyRoom.apk
          make_latest: true
