name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        id: flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: cd trophyroom-app && flutter pub get

      - name: 🔧 Setup Gradle wrapper
        run: |
          cd trophyroom-app
          chmod +x android/gradlew
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar" \
              -o android/gradle/wrapper/gradle-wrapper.jar
          fi
          flutter doctor

      - name: 🔨 Build APK
        run: cd trophyroom-app && flutter build apk --debug

      - name: 📤 Prepare APK
        run: |
          mkdir -p release
          if [ -f "trophyroom-app/build/app/outputs/flutter-apk/app-debug.apk" ]; then
            cp trophyroom-app/build/app/outputs/flutter-apk/app-debug.apk release/TrophyRoom.apk
            echo "APK size: $(ls -lh release/TrophyRoom.apk | awk '{print $5}')"
          else
            echo "APK not found" >&2
            find trophyroom-app -name "*.apk" 2>/dev/null | head -5
            exit 1
          fi

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TrophyRoom v${{ github.run_number }}"
          body: |
            🏆 **TrophyRoom** v${{ github.run_number }}
            
            Flutter 原生 APK — 可直接 sideload 安装
          files: release/TrophyRoom.apk
          make_latest: true
