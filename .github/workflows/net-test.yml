name: Build NetTest APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      
      - name: Build APK
        run: |
          cd net-test
          chmod +x gradlew 2>/dev/null || true
          # Create gradlew if not present
          if [ ! -f gradlew ]; then
            echo "Creating gradle wrapper..."
            gradle wrapper || apt-get install -y gradle 2>/dev/null || true
          fi
          # Build directly
          cd app
          mkdir -p src/main/res/xml
          
          # Install Android SDK cmdline-tools
          export ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          
          # Manual Gradle build
          cd ..  # back to net-test
          # Generate a local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          
          # Try to build using Android gradle
          gradle assembleRelease --no-daemon -p . 2>&1 || gradle wrapper --no-daemon && ./gradlew assembleRelease --no-daemon 2>&1
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nettest-${{ github.run_number }}
          name: NetTest v${{ github.run_number }}
          files: net-test/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
          overwrite_files: true
