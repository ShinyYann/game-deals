name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: trophyroom-app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Setup Gradle wrapper
        run: |
          chmod +x android/gradlew
          # Download Gradle wrapper jar if missing
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Downloading gradle-wrapper.jar..."
            curl -sL "https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar || \
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar" -o android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: 🔨 Check Flutter doctor
        run: flutter doctor -v

      - name: 🔨 Build APK (debug)
        run: flutter build apk --debug 2>&1 | tail -100

      - name: 📤 Prepare APK
        run: |
          mkdir -p release
          # APK should be at build/app/outputs/flutter-apk/app-debug.apk
          echo "Current dir: $(pwd)"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No build dir"
          if [ -f build/app/outputs/flutter-apk/app-debug.apk ]; then
            cp build/app/outputs/flutter-apk/app-debug.apk release/TrophyRoom.apk
            ls -la release/
            echo "APK_SIZE=$(wc -c < release/TrophyRoom.apk | tr -d ' ')" >> $GITHUB_ENV
            echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV
          else
            APK_PATH=$(find . -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$APK_PATH" ]; then
              cp "$APK_PATH" release/TrophyRoom.apk
              echo "APK_SIZE=$(wc -c < release/TrophyRoom.apk | tr -d ' ')" >> $GITHUB_ENV
            else
              echo "No APK found at all!" >&2
              echo "APK_SIZE=0" >> $GITHUB_ENV
            fi
          fi

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TrophyRoom v${{ github.run_number }}"
          body: |
            🏆 **TrophyRoom** 自动构建
            
            - 版本: v${{ github.run_number }}
            - 日期: $(date '+%Y-%m-%d %H:%M')
            
            > 可直接 sideload 安装到安卓设备
          files: trophyroom-app/release/TrophyRoom.apk
          make_latest: true
