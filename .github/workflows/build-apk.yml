name: Build APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Copy web files into Android project
        run: |
          mkdir -p android/app/src/main
          cp -r docs android/app/src/main/assets
          mv android/app/src/main/assets/docs android/app/src/main/assets/web

      - name: Write Android project files
        run: |
          # AndroidManifest.xml
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android"
    package="com.yann.gamedeals">
    <uses-permission android:name="android.permission.INTERNET" />
    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
    <application
        android:allowBackup="true"
        android:icon="@mipmap/ic_launcher"
        android:label="Yann小站"
        android:theme="@android:style/Theme.NoTitleBar"
        android:usesCleartextTraffic="true">
        <activity
            android:name=".MainActivity"
            android:label="Yann小站"
            android:exported="true"
            android:configChanges="orientation|screenSize|keyboardHidden">
            <intent-filter>
                <action android:name="android.intent.action.MAIN" />
                <category android:name="android.intent.category.LAUNCHER" />
            </intent-filter>
        </activity>
    </application>
</manifest>
MANIFEST

          # MainActivity.java
          mkdir -p android/app/src/main/java/com/yann/gamedeals
          cat > android/app/src/main/java/com/yann/gamedeals/MainActivity.java << 'JAVA'
package com.yann.gamedeals;
import android.os.Bundle;
import android.webkit.WebView;
import android.webkit.WebViewClient;
import android.webkit.WebSettings;
import androidx.appcompat.app.AppCompatActivity;
public class MainActivity extends AppCompatActivity {
    private WebView webView;
    @Override
    protected void onCreate(Bundle savedInstanceState) {
        super.onCreate(savedInstanceState);
        webView = new WebView(this);
        setContentView(webView);
        WebSettings settings = webView.getSettings();
        settings.setJavaScriptEnabled(true);
        settings.setDomStorageEnabled(true);
        settings.setLoadWithOverviewMode(true);
        settings.setUseWideViewPort(true);
        settings.setCacheMode(WebSettings.LOAD_DEFAULT);
        webView.setWebViewClient(new WebViewClient());
        webView.loadUrl("https://shinyyann.github.io/game-deals/");
    }
    @Override
    public void onBackPressed() {
        if (webView.canGoBack()) webView.goBack();
        else super.onBackPressed();
    }
}
JAVA

      - name: Write build configs
        run: |
          cat > android/build.gradle << 'GRADLE'
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.5.0'
    }
}
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
GRADLE

          cat > android/settings.gradle << 'GRADLE'
rootProject.name = 'YannGameDeals'
include ':app'
GRADLE

          cat > android/gradle.properties << 'GRADLE'
org.gradle.jvmargs=-Xmx2048m
android.useAndroidX=true
GRADLE

          cat > android/app/build.gradle << 'GRADLE'
plugins {
    id 'com.android.application'
}
android {
    namespace 'com.yann.gamedeals'
    compileSdk 34
    defaultConfig {
        applicationId "com.yann.gamedeals"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
GRADLE

      - name: Generate launcher icon
        run: |
          python3 -c "
import struct, zlib
def png(w,h):
    raw = b''
    for y in range(h):
        raw += b'\x00'
        for x in range(w):
            cx,cy = w//2,h//2
            d = ((x-cx)**2+(y-cy)**2)**0.5
            if d < w*0.26 or abs(x-w//2)<w*0.1:
                raw += bytes([200,200,220,255])
            else:
                raw += bytes([15,22,48,255])
    def c(ty,d):
        return struct.pack('>I',len(d))+ty+d+struct.pack('>I',zlib.crc32(ty+d)&0xffffffff)
    sig = b'\x89PNG\r\n\x1a\n'
    ihdr = struct.pack('>IIBBBBB',w,h,8,6,0,0,0)
    return sig+c(b'IHDR',ihdr)+c(b'IDAT',zlib.compress(raw))+c(b'IEND',b'')
for name,size in [('mipmap-mdpi',48),('mipmap-hdpi',72),('mipmap-xhdpi',96),('mipmap-xxhdpi',144),('mipmap-xxxhdpi',192)]:
    import os
    os.makedirs(f'android/app/src/main/res/{name}', exist_ok=True)
    with open(f'android/app/src/main/res/{name}/ic_launcher.png','wb') as f:
        f.write(png(size))
print('Icons done')
"

      - name: Set up Gradle
        run: |
          cd android
          # Download gradle wrapper
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip &
          cat > gradle/wrapper/gradle-wrapper.properties << 'PROPS'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
PROPS
          # Create gradlew script
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew" -o gradlew
          chmod +x gradlew
          wait

      - name: Build APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Get version
        id: version
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "time=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.date }}
          name: "Yann小站 v${{ steps.version.outputs.date }}"
          body: |
            ## Yann 的小站
            
            📅 更新: ${{ steps.version.outputs.time }}
            
            ### 包含
            - PSN 港服折扣 / Steam 国服折扣 / Switch 港服折扣
            - IGN中国 + GameApps 游戏快讯
            - Steam 成就展示
            
            > App 启动时自动检测新版本
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
