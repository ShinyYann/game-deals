name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: trophyroom-app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 🔨 Accept Android licenses
        run: |
          yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || true
          yes | $JAVA_HOME/bin/sdkmanager --licenses 2>/dev/null || true

      - name: 🏗️ Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons

      - name: 📤 Prepare APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-debug.apk release/TrophyRoom.apk
          echo "APK_SIZE=$(stat -c%s release/TrophyRoom.apk)" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TrophyRoom v${{ github.run_number }}"
          body: |
            🏆 **TrophyRoom** 自动构建
            
            - 版本: v${{ github.run_number }}
            - 日期: ${{ env.BUILD_DATE }}
            - 大小: ${{ env.APK_SIZE }} bytes
            
            > 可直接 sideload 安装到安卓设备
            > 国内用户优先从 Gitee Release 下载
          files: trophyroom-app/release/TrophyRoom.apk
          make_latest: true
