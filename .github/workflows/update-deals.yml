name: 更新游戏折扣

on:
  schedule:
    - cron: '0 0,4,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml

      - name: 运行抓取脚本
        run: python deals.py docs/

      - name: 提交并推送更新
        run: |
          git config user.name 'Game Deals Bot'
          git config user.email 'bot@game-deals.local'
          git add docs/index.html
          git diff --quiet && git diff --staged --quiet || git commit -m 'update deals'
          git push
