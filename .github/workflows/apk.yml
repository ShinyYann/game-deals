name: Build NetTest APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
      
      - name: Setup Android SDK
        run: |
          echo "y" | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --install "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
      
      - name: Build APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export PATH=$ANDROID_HOME/build-tools/34.0.0:$PATH
          
          cd net-test
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          
          # Generate Gradle wrapper
          which gradle && gradle wrapper --no-daemon || true
          
          # Download gradle and build
          if [ ! -f gradlew ]; then
            GRADLE_VERSION=8.12
            curl -sL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle
            /tmp/gradle/gradle-${GRADLE_VERSION}/bin/gradle assembleRelease --no-daemon -p .
          else
            ./gradlew assembleRelease --no-daemon
          fi
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nettest-${{ github.run_number }}
          name: NetTest v${{ github.run_number }}
          files: net-test/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
          overwrite_files: true
