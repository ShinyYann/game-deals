name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/lib/**'
      - 'trophyroom-app/pubspec.yaml'
      - '.github/workflows/apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Copy code and generate Android project
        run: |
          mkdir -p /tmp/tbuild
          cp -r ${{ github.workspace }}/trophyroom-app/* /tmp/tbuild/
          cd /tmp/tbuild
          rm -rf android lib test
          flutter create --org com.trophyroom --project-name trophyroom .
          rm -f lib/main.dart
          cp -r ${{ github.workspace }}/trophyroom-app/lib/* lib/
          mkdir -p assets
          cp -r ${{ github.workspace }}/trophyroom-app/assets/* assets/ 2>/dev/null || true
          # Add internet permissions
          awk '/<application/ {
            print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\"/>"
            print ""; print $0; next
          } {print}' android/app/src/main/AndroidManifest.xml > AndroidManifest.xml.new
          mv AndroidManifest.xml.new android/app/src/main/AndroidManifest.xml
          # Add deep link intent filter for PSN OAuth redirect
          sed -i '/<activity/,/<\/activity>/ {
            /<\/activity>/i\
            <intent-filter>\
                <action android:name="android.intent.action.VIEW" />\
                <category android:name="android.intent.category.DEFAULT" />\
                <category android:name="android.intent.category.BROWSABLE" />\
                <data android:scheme="com.scee.psxandroid" />\
            </intent-filter>
          }' android/app/src/main/AndroidManifest.xml
          # RESTORE pubspec.yaml (flutter create overwrites it!)
          cp ${{ github.workspace }}/trophyroom-app/pubspec.yaml pubspec.yaml
          echo "code prepared"

      - name: Build APK
        run: |
          cd /tmp/tbuild
          flutter pub get --offline 2>/dev/null || true
          flutter pub get
          flutter build apk --release --target-platform android-arm,android-arm64
      
      - name: Copy and release
        run: |
          cp /tmp/tbuild/build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/TrophyRoom.apk
          echo "APK_SIZE=$(ls -lh ${{ github.workspace }}/TrophyRoom.apk | awk '{print $5}')" >> $GITHUB_ENV
          rm -rf /tmp/tbuild

      - uses: actions/upload-artifact@v4
        with:
          name: TrophyRoom-APK
          path: ${{ github.workspace }}/TrophyRoom.apk
          retention-days: 1

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "TrophyRoom Latest"
          body: "Auto-build ${{ github.run_number }} — ${{ env.APK_SIZE }}"
          artifacts: ${{ github.workspace }}/TrophyRoom.apk
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
