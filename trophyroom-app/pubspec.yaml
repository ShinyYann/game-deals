name: trophyroom
description: TrophyRoom - Minimal APK
publish_to: 'none'
version: 1.0.2+16

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  path_provider: ^2.1.0
  url_launcher: ^6.3.2
  just_audio: ^0.9.36
  webview_flutter: 4.2.0
  shared_preferences: ^2.2.0
  video_player: ^2.8.0
  phosphor_flutter: ^2.0.0
  sensors_plus: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/splash.png
    - assets/logo/logo_yann_design.png
    - assets/logo/logo_yann_design.jpg

  fonts:
    - family: ZCOOLQingKeHuangYou
      fonts:
        - asset: assets/fonts/ZCOOLQingKeHuangYou-Regular.ttf
          weight: 400
    - family: Orbitron
      fonts:
        - asset: assets/fonts/Orbitron-Regular.ttf
          weight: 400
        - asset: assets/fonts/Orbitron-Bold.ttf
          weight: 700
