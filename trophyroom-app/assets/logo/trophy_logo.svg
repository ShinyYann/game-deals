<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- 深色背景 -->
  <rect width="200" height="240" fill="#0A0A12" rx="20"/>

  <!-- 奖杯轮廓 - 极简连续线条 -->
  <path d="
    M 100 30
    C 100 30, 60 60, 55 85
    C 50 110, 40 130, 40 150
    C 40 175, 60 190, 80 195
    L 90 195
    C 90 195, 95 200, 95 210
    L 95 215
    C 95 220, 90 220, 90 220
    L 110 220
    C 110 220, 105 220, 105 215
    L 105 210
    C 105 200, 110 195, 110 195
    L 120 195
    C 140 190, 160 175, 160 150
    C 160 130, 150 110, 145 85
    C 140 60, 100 30, 100 30
    Z
  " fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 奖杯把手（耳朵）左 -->
  <path d="
    M 55 100
    C 30 105, 15 130, 25 155
    C 30 168, 40 175, 45 170
  " fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 奖杯把手（耳朵）右 -->
  <path d="
    M 145 100
    C 170 105, 185 130, 175 155
    C 170 168, 160 175, 155 170
  " fill="none" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 星星点缀 -->
  <text x="100" y="118" text-anchor="middle" fill="#FFD700" font-size="18" font-family="sans-serif">★</text>

  <!-- TROPHYROOM 文字 -->
  <text x="100" y="240" text-anchor="middle" fill="#888" font-size="11" font-family="Helvetica, Arial, sans-serif" font-weight="300" letter-spacing="4">TROPHYROOM</text>
</svg>
