name: Build TrophyRoom APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'trophyroom-app/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Download gradle-wrapper.jar
        working-directory: trophyroom-app/android
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Create key.properties
        run: |
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias release -keyalg RSA -keysize 2044 -validity 10000 \
            -storepass trophyroom -keypass trophyroom \
            -dname "CN=TrophyRoom, OU=Dev, O=Yann, L=Shanghai, S=Shanghai, C=CN"
          cat > trophyroom-app/android/key.properties << EOF
          storePassword=trophyroom
          keyPassword=trophyroom
          keyAlias=release
          storeFile=/tmp/release.keystore
          EOF

      - name: Get dependencies
        working-directory: trophyroom-app
        run: flutter pub get

      - name: Build Release APK
        working-directory: trophyroom-app
        run: |
          flutter build apk --release --build-number=${{ github.run_number }} --build-name=1.0.${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk /tmp/TrophyRoom.apk
          ls -lh /tmp/TrophyRoom.apk

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ github.run_number }}" \
            "/tmp/TrophyRoom.apk#TrophyRoom.apk" \
            --title "TrophyRoom v${{ github.run_number }}" \
            --notes "Release APK - targetSdk33, signed" \
            --latest || true
          # Also try softprops as fallback
      - name: Softprops Release (fallback)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          files: /tmp/TrophyRoom.apk
          make_latest: true
          fail_on_unmatched_files: false
