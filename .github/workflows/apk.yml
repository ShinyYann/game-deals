name: Build APK
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SDK
        run: |
          mkdir -p $HOME/android/cmdline-tools
          cd $HOME/android
          curl -sLo cmdline-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline-tools.zip -d cmdline-tools
          mv cmdline-tools/cmdline-tools cmdline-tools/latest 2>/dev/null || true
          yes | sdkmanager --sdk_root=$HOME/android "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -3
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android/platform-tools" >> $GITHUB_PATH
      - name: Prepare project
        run: |
          which python3
          ls -la prepare_apk.py
          python3 prepare_apk.py
      - name: Gradle wrapper
        run: |
          cd android
          curl -sL -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew
          chmod +x gradlew
      - name: Build APK
        run: cd android && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /home/runner/android
      - name: Prepare Release
        run: |
          find android -name "*.apk" 2>/dev/null
          cp android/app/build/outputs/apk/debug/app-debug.apk Yann小站.apk 2>/dev/null || echo "No APK found"
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Yann小站 v${{ github.run_number }}"
          body: "📱 自动构建 APK"
          files: Yann小站.apk
          make_latest: true
