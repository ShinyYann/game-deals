name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/lib/**'
      - 'trophyroom-app/pubspec.yaml'
      - '.github/workflows/apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          # 全新 clone 到独立目录，避免 watch 冲突
          TMPDIR=$(mktemp -d)
          cd "$TMPDIR"
          
          # 直接把整个 trophyroom-app 复制过去
          mkdir -p trophyroom/lib
          cp -r ${{ github.workspace }}/trophyroom-app/* trophyroom/
          
          # 生成 Android 项目结构
          cd trophyroom
          rm -rf android
          flutter create --org com.trophyroom --project-name trophyroom --platforms android .
          
          # 恢复用户代码
          rm -f lib/main.dart
          cp -r ${{ github.workspace }}/trophyroom-app/lib/* lib/
          
          # 添加权限
          ANDROID_MANIFEST="android/app/src/main/AndroidManifest.xml"
          awk '
          /<application/ {
            print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\"/>"
            print ""
            print $0
            next
          }
          { print }
          ' "$ANDROID_MANIFEST" > "${ANDROID_MANIFEST}.new"
          mv "${ANDROID_MANIFEST}.new" "$ANDROID_MANIFEST"
          
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' "android/app/build.gradle"
          
                              flutter pub get
          flutter build apk --release --target-platform android-arm,android-arm64
          
          cp build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/TrophyRoom.apk
          echo "APK_SIZE=$(ls -lh ${{ github.workspace }}/TrophyRoom.apk | awk '{print $5}')" >> $GITHUB_ENV
          rm -rf "$TMPDIR"

      - uses: actions/upload-artifact@v4
        with:
          name: TrophyRoom-APK
          path: ${{ github.workspace }}/TrophyRoom.apk
          retention-days: 1

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "TrophyRoom Latest"
          body: "Auto-build ${{ github.run_number }} — ${{ env.APK_SIZE }}"
          artifacts: ${{ github.workspace }}/TrophyRoom.apk
          allowUpdates: false
          token: ${{ secrets.GITHUB_TOKEN }}
