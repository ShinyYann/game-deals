name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/lib/**'
      - 'trophyroom-app/pubspec.yaml'
      - '.github/workflows/apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          cd /tmp
          flutter create --org com.trophyroom --project-name trophyroom --platforms android trophyroom

          rm -rf /tmp/trophyroom/lib/*
          cp -r ${{ github.workspace }}/trophyroom-app/lib/* /tmp/trophyroom/lib/
          cp ${{ github.workspace }}/trophyroom-app/pubspec.yaml /tmp/trophyroom/pubspec.yaml
          mkdir -p /tmp/trophyroom/assets
          cp ${{ github.workspace }}/trophyroom-app/assets/splash.png /tmp/trophyroom/assets/splash.png

          cd /tmp/trophyroom
          rm -f pubspec.lock
          flutter pub get

          ANDROID_MANIFEST="/tmp/trophyroom/android/app/src/main/AndroidManifest.xml"
          awk '
          /<application/ {
            print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\"/>"
            print ""
            print $0
            next
          }
          { print }
          ' "$ANDROID_MANIFEST" > "${ANDROID_MANIFEST}.new"
          mv "${ANDROID_MANIFEST}.new" "$ANDROID_MANIFEST"
          grep "permission" "$ANDROID_MANIFEST"

          BUILD_GRADLE="/tmp/trophyroom/android/app/build.gradle"
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' "$BUILD_GRADLE"
          grep "minSdkVersion" "$BUILD_GRADLE"

          flutter build apk --release --target-platform android-arm,android-arm64
          cp build/app/outputs/flutter-apk/app-release.apk /tmp/TrophyRoom.apk

      - uses: actions/upload-artifact@v4
        with:
          name: TrophyRoom-APK
          path: /tmp/TrophyRoom.apk
          retention-days: 1

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: apk-minimal
          name: "TrophyRoom v1.0.0"
          body: |
            TrophyRoom APK — 离线数据 + 联网更新
            
            - 内置 25 款热门折扣游戏
            - 自动从 Gitee/GitHub 更新数据
            - 无论联网与否都能用
          artifacts: /tmp/TrophyRoom.apk
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Aliyun
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 8.153.97.56
          username: root
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          port: 22
          source: /tmp/TrophyRoom.apk
          target: /var/www/apk/
          strip_components: 2
          rm: true
