name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: trophyroom-app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: 📦 Get packages
        run: flutter pub get

      - name: 📦 Get Gradle wrapper
        run: |
          ls -la android/gradle/wrapper/
          flutter build apk --debug 2>&1 | head -50

      - name: Pre-cache Gradle
        run: |
          cd android
          ./gradlew --version 2>&1 | tail -5

      - name: Build APK
        run: flutter build apk --debug

      - name: Prepare APK for release
        run: |
          mkdir -p ${{ github.workspace }}/release
          cp build/app/outputs/flutter-apk/app-debug.apk ${{ github.workspace }}/release/TrophyRoom.apk
          ls -la ${{ github.workspace }}/release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          body: 🏆 TrophyRoom APK
          files: release/TrophyRoom.apk
          make_latest: true
