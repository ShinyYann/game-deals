<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <!-- 深色背景 -->
  <rect width="200" height="240" fill="#0A0A12" rx="20"/>

  <!-- 极简奖杯 - Apple 风格单线条 -->
  <!-- 杯子主体 -->
  <path d="
    M 60 75
    Q 60 40, 100 35
    Q 140 40, 140 75
    L 140 110
    Q 140 140, 120 150
    L 110 150
    Q 110 150, 108 160
    L 108 175
    L 92 175
    L 92 160
    Q 90 150, 90 150
    L 80 150
    Q 60 140, 60 110
    Z
  " fill="none" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 杯子底部横线 -->
  <line x1="85" y1="180" x2="115" y2="180" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 底座 -->
  <line x1="70" y1="195" x2="130" y2="195" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round"/>

  <!-- T, R 字母缩写 -->
  <text x="100" y="125" text-anchor="middle" fill="#D4AF37" font-size="28" font-family="Helvetica, Arial, sans-serif" font-weight="600">T</text>

  <!-- 底部文字 -->
  <text x="100" y="228" text-anchor="middle" fill="#666" font-size="10" font-family="Helvetica, Arial, sans-serif" font-weight="300" letter-spacing="5">TROPHY ROOM</text>
</svg>
