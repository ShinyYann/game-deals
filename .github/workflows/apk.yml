name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/lib/**'
      - 'trophyroom-app/pubspec.yaml'
      - '.github/workflows/apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          # Create a fresh Flutter project (generates correct android/ structure)
          cd /tmp
          flutter create --org com.trophyroom --project-name trophyroom --platforms android trophyroom

          # Copy our custom Dart code
          rm -rf /tmp/trophyroom/lib/*
          cp -r ${{ github.workspace }}/trophyroom-app/lib/* /tmp/trophyroom/lib/
          cp ${{ github.workspace }}/trophyroom-app/pubspec.yaml /tmp/trophyroom/pubspec.yaml

          cd /tmp/trophyroom
          flutter pub get

          # Force INTERNET permissions into the generated AndroidManifest
          ANDROID_MANIFEST="/tmp/trophyroom/android/app/src/main/AndroidManifest.xml"
          awk '
          /<application/ {
            print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\"/>"
          }
          { print }
          ' "$ANDROID_MANIFEST" > "${ANDROID_MANIFEST}.new"
          mv "${ANDROID_MANIFEST}.new" "$ANDROID_MANIFEST"
          grep "permission" "$ANDROID_MANIFEST"

          flutter build apk --release --target-platform android-arm,android-arm64
          cp build/app/outputs/flutter-apk/app-release.apk /tmp/TrophyRoom.apk

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: apk-minimal
          name: "TrophyRoom v1.0.0"
          body: |
            最小化 APK — 联网权限测试
            
            - 仅一个页面 + 联网测试按钮
            - 权限: INTERNET, ACCESS_NETWORK_STATE, ACCESS_WIFI_STATE
          artifacts: /tmp/TrophyRoom.apk
          allowUpdates: true
          replacesArtifacts: true
