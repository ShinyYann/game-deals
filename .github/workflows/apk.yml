name: Build TrophyRoom APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          set -ex

          # 1. Create fresh Flutter project
          cd /tmp
          flutter create --org com.yann --project-name trophyroom trophyroom

          # 2. Copy our code into it
          OUR_CODE="${{ github.workspace }}/trophyroom-app"
          rm -rf /tmp/trophyroom/lib/*
          cp -r "$OUR_CODE/lib/"* /tmp/trophyroom/lib/
          cp "$OUR_CODE/pubspec.yaml" /tmp/trophyroom/pubspec.yaml

          # 3. Install dependencies
          cd /tmp/trophyroom
          flutter pub get

          # 4. Patch app/build.gradle - applicationId + signing
          cd /tmp/trophyroom/android
          sed -i 's/applicationId ".*"/applicationId "com.yann.trophyroom"/' app/build.gradle

          # 5. Append signing config
          cat >> app/build.gradle << 'SIGNGRADLE'

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }
          android {
              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
                      storePassword keystoreProperties['storePassword']
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          SIGNGRADLE

          # 6. Create keystore and key.properties
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass trophyroom -keypass trophyroom \
            -dname "CN=TrophyRoom, OU=Dev, O=Yann, L=Shanghai, S=Shanghai, C=CN"

          cat > /tmp/trophyroom/android/key.properties << KEYEOF
          storePassword=trophyroom
          keyPassword=trophyroom
          keyAlias=release
          storeFile=/tmp/release.keystore
          KEYEOF

          # 7. Build release APK
          cd /tmp/trophyroom
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}

          # 8. Copy APK for upload
          cp build/app/outputs/flutter-apk/app-release.apk /tmp/TrophyRoom.apk

          # 9. Verify
          file /tmp/TrophyRoom.apk
          ls -lh /tmp/TrophyRoom.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          files: /tmp/TrophyRoom.apk
          make_latest: true
          fail_on_unmatched_files: false
          generate_release_notes: false
