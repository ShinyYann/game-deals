name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/lib/**'
      - 'trophyroom-app/pubspec.yaml'
      - '.github/workflows/apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          cd /tmp
          flutter create --org com.trophyroom --project-name trophyroom --platforms android trophyroom

          rm -rf /tmp/trophyroom/lib/*
          cp -r ${{ github.workspace }}/trophyroom-app/lib/* /tmp/trophyroom/lib/
          cp ${{ github.workspace }}/trophyroom-app/pubspec.yaml /tmp/trophyroom/pubspec.yaml
          mkdir -p /tmp/trophyroom/assets
          cp ${{ github.workspace }}/trophyroom-app/assets/splash.png /tmp/trophyroom/assets/splash.png
          mkdir -p /tmp/trophyroom/assets/logo
          cp -r ${{ github.workspace }}/trophyroom-app/assets/logo/* /tmp/trophyroom/assets/logo/

          cd /tmp/trophyroom
          rm -f pubspec.lock
          flutter pub get

          ANDROID_MANIFEST="/tmp/trophyroom/android/app/src/main/AndroidManifest.xml"
          awk '
          /<application/ {
            print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\"/>"
            print ""
            print $0
            next
          }
          { print }
          ' "$ANDROID_MANIFEST" > "${ANDROID_MANIFEST}.new"
          mv "${ANDROID_MANIFEST}.new" "$ANDROID_MANIFEST"

          BUILD_GRADLE="/tmp/trophyroom/android/app/build.gradle"
          sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/' "$BUILD_GRADLE"

          flutter build apk --release --target-platform android-arm,android-arm64

      - name: Copy APK
        run: |
          cp /tmp/trophyroom/build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/TrophyRoom.apk
          echo "APK_SIZE=$(ls -lh ${{ github.workspace }}/TrophyRoom.apk | awk '{print $5}')" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: TrophyRoom-APK
          path: ${{ github.workspace }}/TrophyRoom.apk
          retention-days: 1

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "TrophyRoom Latest"
          body: "Auto-build ${{ github.run_number }} — ${{ env.APK_SIZE }}"
          artifacts: ${{ github.workspace }}/TrophyRoom.apk
          allowUpdates: false
          token: ${{ secrets.GITHUB_TOKEN }}
