name: Build APK (v3)

# trigger rebuild 2026-05-07

on:
  push:
    branches: [main]
    paths:
      - 'trophyroom-app/lib/**'
      - 'trophyroom-app/pubspec.yaml'
      - '.github/workflows/apk.yml'
  workflow_dispatch:

concurrency: apk-build-${{ github.ref }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Copy code and generate Android project
        run: |
          mkdir -p /tmp/tbuild
          cp -r ${{ github.workspace }}/trophyroom-app/* /tmp/tbuild/
          cd /tmp/tbuild
          rm -rf android lib test
          flutter create --org com.trophyroom --project-name trophyroom .
          rm -f lib/main.dart
          cp -r ${{ github.workspace }}/trophyroom-app/lib/* lib/
          mkdir -p assets
          cp -r ${{ github.workspace }}/trophyroom-app/assets/* assets/ 2>/dev/null || true
          # Add internet permissions
          awk '/<application/ {
            print "    <uses-permission android:name=\"android.permission.INTERNET\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>"
            print "    <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\"/>"
            print ""; print $0; next
          } {print}' android/app/src/main/AndroidManifest.xml > AndroidManifest.xml.new
          mv AndroidManifest.xml.new android/app/src/main/AndroidManifest.xml
          # Add deep link intent filter for PSN OAuth redirect
          sed -i '/<activity/,/<\/activity>/ {
            /<\/activity>/i\
            <intent-filter>\
                <action android:name="android.intent.action.VIEW" />\
                <category android:name="android.intent.category.DEFAULT" />\
                <category android:name="android.intent.category.BROWSABLE" />\
                <data android:scheme="com.scee.psxandroid" />\
            </intent-filter>
          }' android/app/src/main/AndroidManifest.xml
          # RESTORE pubspec.yaml (flutter create overwrites it!)
          cp ${{ github.workspace }}/trophyroom-app/pubspec.yaml pubspec.yaml
          # Fix NDK 27 → 26 (source.properties missing in 27)
          sed -i 's/ndkVersion = flutter\.ndkVersion/ndkVersion = "26.3.11579264"/' android/app/build.gradle.kts
          # Aliyun Maven mirrors (Google blocked in China)
          sed -i 's|google()|maven { url = uri("https://maven.aliyun.com/repository/google") }\n        maven { url = uri("https://maven.aliyun.com/repository/public") }\n        google()|' android/settings.gradle.kts
          sed -i 's|google()|maven { url = uri("https://maven.aliyun.com/repository/google") }\n        maven { url = uri("https://maven.aliyun.com/repository/public") }\n        google()|' android/build.gradle.kts
          # Fix: Add INTERNET permission (missing in release manifest by default)
          sed -i 's|<manifest xmlns:android="http://schemas.android.com/apk/res/android">|<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.INTERNET"/>|' android/app/src/main/AndroidManifest.xml
          # Fix: Allow cleartext HTTP traffic (Android 9+ blocks it)
          sed -i 's|android:label="trophyroom"|android:label="trophyroom"\n        android:networkSecurityConfig="@xml/network_security_config"\n        android:usesCleartextTraffic="true"|' android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/res/xml
          cp ${{ github.workspace }}/trophyroom-app/android/app/src/main/res/xml/network_security_config.xml android/app/src/main/res/xml/
          echo "code prepared (ndk + maven + network fixed)"

      - name: Build APK (v2)
        run: |
          cd /tmp/tbuild
          flutter pub get --offline 2>/dev/null || true
          flutter pub get
          flutter build apk --release --target-platform android-arm,android-arm64
      
      - name: Copy and release
        run: |
          cp /tmp/tbuild/build/app/outputs/flutter-apk/app-release.apk ${{ github.workspace }}/TrophyRoom.apk
          echo "APK_SIZE=$(ls -lh ${{ github.workspace }}/TrophyRoom.apk | awk '{print $5}')" >> $GITHUB_ENV
          rm -rf /tmp/tbuild

      - uses: actions/upload-artifact@v4
        with:
          name: TrophyRoom-APK
          path: ${{ github.workspace }}/TrophyRoom.apk
          retention-days: 1

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "TrophyRoom Latest"
          body: "Auto-build ${{ github.run_number }} — ${{ env.APK_SIZE }}"
          files: ${{ github.workspace }}/TrophyRoom.apk
          make_latest: true
          append_body: false
          token: ${{ secrets.GITHUB_TOKEN }}
