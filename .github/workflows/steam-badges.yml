name: Steam 徽章每日更新

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 8:00 北京时间
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scrape Steam badges
        run: |
          python3 steam_badge_scraper.py 76561198206837309 > steam_badges_cache.json
          count=$(python3 -c 'import json;d=json.load(open("steam_badges_cache.json"));print(d.get("badge_count",0))')
          xp=$(python3 -c 'import json;d=json.load(open("steam_badges_cache.json"));print(d.get("total_xp",0))')
          echo "Scraped $count badges, $xp XP"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add steam_badges_cache.json
          git diff --staged --quiet || git commit -m "chore: update steam badges cache [skip ci]"
          git push
