name: Build TrophyRoom APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'trophyroom-app/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true

      - name: Download gradle-wrapper.jar
        working-directory: trophyroom-app/android
        run: |
          curl -sL "https://github.com/gradle/gradle/raw/v8.3.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Create key.properties
        run: |
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias release -keyalg RSA -keysize 2044 -validity 10000 \
            -storepass trophyroom -keypass trophyroom \
            -dname "CN=TrophyRoom, OU=Dev, O=Yann, L=Shanghai, S=Shanghai, C=CN"
          cat > trophyroom-app/android/key.properties << EOF
          storePassword=trophyroom
          keyPassword=trophyroom
          keyAlias=release
          storeFile=/tmp/release.keystore
          EOF

      - name: Get dependencies
        working-directory: trophyroom-app
        run: flutter pub get

      - name: Build Release APK (no-compress)
        working-directory: trophyroom-app
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}
          ls -lh build/app/outputs/flutter-apk/

      - name: Verify APK integrity
        run: |
          echo "=== APK file info ==="
          file trophyroom-app/build/app/outputs/flutter-apk/app-release.apk
          echo "=== PK ZIP check ==="
          python3 -c "
import zipfile
try:
    with zipfile.ZipFile('trophyroom-app/build/app/outputs/flutter-apk/app-release.apk') as z:
        names = z.namelist()
        print(f'Files in APK: {len(names)}')
        for n in names[:10]:
            print(f'  {n}')
        if 'AndroidManifest.xml' in names:
            print('✅ AndroidManifest.xml found')
        if 'classes.dex' in names:
            print('✅ classes.dex found')
        if 'META-INF/CERT.RSA' in names:
            print('✅ Signature found')
        # check file sizes
        total = sum(z.getinfo(n).file_size for n in names)
        print(f'Uncompressed size: {total/1024/1024:.1f} MB')
        print(f'Compressed size: {sum(z.getinfo(n).compress_size for n in names)/1024/1024:.1f} MB')
except Exception as e:
    print(f'❌ ZIP check failed: {e}')
"

      - name: Copy APK
        run: |
          cp trophyroom-app/build/app/outputs/flutter-apk/app-release.apk /tmp/TrophyRoom.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          files: /tmp/TrophyRoom.apk
          make_latest: true
          fail_on_unmatched_files: false
          generate_release_notes: false
