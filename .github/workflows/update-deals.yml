name: 更新游戏折扣（服务器数据）

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml requests

      - name: 从服务器拉取折扣数据
        run: python refresh_deals.py

      - name: 提交并推送更新
        run: |
          git config user.name 'Game Deals Bot'
          git config user.email 'bot@game-deals.local'
          git add docs/index.html docs/data/deals.json
          git diff --quiet && git diff --staged --quiet || git commit -m 'update deals'
          git push

      - name: 同步到 Gitee
        run: |
          git remote add gitee https://yann8888:${{ secrets.GITEE_TOKEN }}@gitee.com/yann8888/game-deals.git
          git push gitee main
          git remote remove gitee
