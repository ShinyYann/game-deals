name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: 📦 Get packages
        working-directory: trophyroom-app
        run: flutter pub get

      - name: 🔨 Build APK
        working-directory: trophyroom-app
        run: flutter build apk --debug

      - name: 📤 Move APK to root
        run: |
          mkdir -p release
          cp trophyroom-app/build/app/outputs/flutter-apk/app-debug.apk release/TrophyRoom.apk
          ls -lh release/

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          body: 🏆 TrophyRoom APK
          files: release/TrophyRoom.apk
          make_latest: true
