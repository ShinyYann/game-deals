name: Build TrophyRoom APK

on:
  push:
    branches: [ main ]
    paths:
      - 'trophyroom-app/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: trophyroom-app

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔧 Setup Gradle wrapper
        run: |
          chmod +x android/gradlew
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar" \
              -o android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: 🔨 Build APK (debug)
        run: flutter build apk --debug

      - name: 📤 Prepare APK
        run: |
          mkdir -p release
          # APK is in trophyroom-app/build/... but we're already in trophyroom-app/
          cp build/app/outputs/flutter-apk/app-debug.apk release/TrophyRoom.apk
          echo "APK_SIZE=$(wc -c < release/TrophyRoom.apk | tr -d ' ')" >> $GITHUB_ENV

      - name: 🚀 Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "TrophyRoom v${{ github.run_number }}"
          body: |
            🏆 TrophyRoom v${{ github.run_number }}
            
            Flutter 原生 APK
          files: trophyroom-app/release/TrophyRoom.apk
          make_latest: true
