name: Build TrophyRoom APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'trophyroom-app/**'
      - '.github/workflows/apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'  # Latest stable (3.24+)
          cache: true

      - name: Create key.properties
        run: |
          keytool -genkey -v -keystore /tmp/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass trophyroom -keypass trophyroom \
            -dname "CN=TrophyRoom, OU=Dev, O=Yann, L=Shanghai, S=Shanghai, C=CN"
          cat > trophyroom-app/android/key.properties << EOF
          storePassword=trophyroom
          keyPassword=trophyroom
          keyAlias=release
          storeFile=/tmp/release.keystore
          EOF

      - name: Get dependencies
        working-directory: trophyroom-app
        run: flutter pub get

      - name: Build Release APK
        working-directory: trophyroom-app
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }}
          cp build/app/outputs/flutter-apk/app-release.apk /tmp/TrophyRoom.apk

      - name: Verify APK
        run: |
          file /tmp/TrophyRoom.apk
          ls -lh /tmp/TrophyRoom.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: TrophyRoom v${{ github.run_number }}
          files: /tmp/TrophyRoom.apk
          make_latest: true
          fail_on_unmatched_files: false
          generate_release_notes: false
