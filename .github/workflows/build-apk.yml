name: Build APK

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'  # 每天UTC 0点自动跑一次

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Capacitor Android project
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Yann小站" "com.yann.gamedeals" --web-dir docs
          npx cap add android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Get version
        id: version
        run: |
          echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.date }}
          name: "Yann小站 v${{ steps.version.outputs.date }}"
          body: |
            ## Yann 的小站
            
            📅 更新日期: ${{ steps.version.outputs.time }}
            
            ### 内容
            - PSN 港服折扣
            - Steam 国服折扣  
            - Switch 港服折扣
            - IGN中国 + GameApps 游戏快讯
            - Steam 成就展示
            
            💡 启动时会自动检查新版本
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
